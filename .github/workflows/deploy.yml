name: MLOps CI/CD Model Deployment

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  # Choose your cloud deployment target: 'aws' or 'gcp' (uncomment and configure active job in CD stage)
  DEPLOY_TARGET: "aws" 
  
  # AWS Configuration
  AWS_REGION: "us-east-1"
  ECR_REPOSITORY: "my-ml-model-repo"
  ECS_SERVICE: "ml-model-service"
  ECS_CLUSTER: "ml-model-cluster"
  ECS_TASK_DEFINITION: ".aws/task-definition.json"
  CONTAINER_NAME: "ml-model-api"

  # GCP Configuration (Uncomment and configure if deploying to GCP Cloud Run)
  # GCP_PROJECT_ID: "my-gcp-project"
  # GCP_REGION: "us-central1"
  # GAR_REPOSITORY: "my-ml-model-repo" # Google Artifact Registry
  # SERVICE_NAME: "ml-model-api"

jobs:
  ci-test:
    name: Continuous Integration (Lint & Test)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: uses/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r app/requirements.txt

    - name: Lint with Flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 app tests --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings
        flake8 app tests --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Format Check with Black
      run: |
        black --check app tests

    - name: Run Unit Tests
      run: |
        pytest tests/ -v

    - name: Verify Docker Build
      run: |
        docker build -t test-image:latest .

  cd-deploy-aws:
    name: Continuous Deployment (AWS ECR & ECS)
    needs: ci-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, tag, and push image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # Build the docker container and push it to ECR
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Fill in the new image ID in the Amazon ECS task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: ${{ env.ECS_TASK_DEFINITION }}
        container-name: ${{ env.CONTAINER_NAME }}
        image: ${{ steps.build-image.outputs.image }}

    - name: Deploy Amazon ECS task definition
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true

